<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Travelling App</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>

  <body>
    <div class="container">
      <div class="card">
        <div class="logo">
          <h1>Travelling App</h1>
          <p>Book your ride in seconds</p>
        </div>

        <form action="/find-driver" method="POST">
          <label>Pickup Location</label>
          <select name="pickup">
            {% for location in locations %}
            <option>{{ location }}</option>
            {% endfor %}
          </select>

          <label>Destination</label>
          <select name="destination">
            {% for location in locations %}
            <option>{{ location }}</option>
            {% endfor %}
          </select>

          <button type="submit">Find Driver</button>
        </form>
      </div>
    </div>
  </body>
</html>
